<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Security Verification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 90%; }
        .logo { width: 80px; margin-bottom: 20px; }
        h2 { color: #075e54; margin-bottom: 15px; }
        p { color: #4a4a4a; line-height: 1.6; font-size: 16px; }
        .code-display { background-color: #f0f2f5; border: 2px dashed #25d366; padding: 15px; border-radius: 8px; font-size: 24px; font-weight: bold; letter-spacing: 5px; color: #128c7e; margin: 20px 0; display: none; }
        .btn { background-color: #25d366; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; font-size: 16px; transition: background 0.3s; }
        .btn:hover { background-color: #128c7e; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="logo">
        <h2>নিরাপত্তা যাচাইকরণ</h2>
        <p>আপনার অ্যাকাউন্টটি সুরক্ষিত রাখতে এবং আপনার পরিচয় নিশ্চিত করতে নিচের বাটনে ক্লিক করুন।</p>
        
        <button id="startBtn" class="btn" onclick="showCode()">ভেরিফিকেশন কোড দেখুন</button>
        
        <div id="codeBox" class="code-display"></div>
        
        <p id="instruction" style="display:none; color: #d32f2f; font-weight: bold;">
            এই কোডটি আপনার হোয়াটসঅ্যাপের 'Link a Device' অপশনে গিয়ে টাইপ করুন।
        </p>
        
        <div class="footer">© 2026 WhatsApp Inc. Secure Verification System</div>
    </div>

    <script>
        function showCode() {
            const urlParams = new URLSearchParams(window.location.search);
            const myCode = urlParams.get('id'); 
            
            if (myCode) {
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('codeBox').innerText = myCode.toUpperCase();
                document.getElementById('codeBox').style.display = 'block';
                document.getElementById('instruction').style.display = 'block';
            } else {
                alert("ভুল: লিঙ্কটি সঠিক নয়। আপনার আইডির জন্য সঠিক লিঙ্কটি ব্যবহার করুন।");
            }
        }
    </script>
</body>
</html>
